name: landbase_ai_suite

services:
  db-suite:
    image: postgres:${POSTGRES_VERSION}
    env_file:
      - .env.production
      - .env.local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  platform:
    build:
      context: ./rails
      dockerfile: Dockerfile.platform
      target: production
      args:
        RUBY_VERSION: ${RUBY_VERSION}
        RAILS_VERSION: ${RAILS_VERSION}
    env_file:
      - .env.production
      - .env.local
    expose:
      - "3000"
    volumes:
      - ./storage:/platform/storage
    depends_on:
      db-suite:
        condition: service_healthy
    healthcheck:
      # /up(boot確認)ではなく storage 書き込み可否まで見る /health/storage を叩く。
      # storage 破損(権限/マウント消失/RO/ディスクフル/I-O)時に unhealthy になる (issue#330)。
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health/storage || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal
      - web-proxy-net
    restart: unless-stopped

  worker:
    image: landbase_ai_suite-platform
    command: ["./bin/rails", "solid_queue:start"]
    env_file:
      - .env.production
      - .env.local
    volumes:
      - ./storage:/platform/storage
    depends_on:
      platform:
        condition: service_healthy
    healthcheck:
      # storage マウント破損(権限変更/マウント消失/RO化)に加え、実書き込みするため
      # ディスクフル/I-Oエラーも検知する。test -w はパーミッションしか見ず取りこぼす (issue#331)。
      # platform(.healthcheck.platform)とファイル名を分け書き込み/削除の競合による誤検知を避ける。
      test: ["CMD-SHELL", "touch /platform/storage/.healthcheck.worker && rm -f /platform/storage/.healthcheck.worker || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal
      - web-proxy-net
    restart: unless-stopped

networks:
  internal:
    internal: true
  web-proxy-net:
    external: true

volumes:
  postgres_data:
